spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - TokenRelay
      routes:
        - id: guest-service
          uri: lb://guest-service
          predicates:
            - Path=/guests/**
        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/hotels/**
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/rooms/**
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/reservations/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
  security:
    oauth2:
      resource server:
        jwt:
          issuer-uri: http://localhost:8087/realms/hotel_app
          jwk-set-uri: http://localhost:8087/realms/hotel_app/protocol/openid-connect/certs

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway


