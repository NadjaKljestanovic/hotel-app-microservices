name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Development pipeline: build and test on every push/PR
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build project
        run: mvn -B clean compile

      - name: Run unit and integration tests
        run: mvn -B test

      - name: Package all services
        run: mvn -B package -DskipTests

  # Production pipeline stage: build Docker images after successful tests
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Development: images are built locally without pushing to a registry
      - name: Build discovery-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: discovery-server/Dockerfile
          push: false
          tags: hotel-booking/discovery-server:latest

      - name: Build config-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config-server/Dockerfile
          push: false
          tags: hotel-booking/config-server:latest

      - name: Build api-gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api-gateway/Dockerfile
          push: false
          tags: hotel-booking/api-gateway:latest

      - name: Build guest-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: guest-service/Dockerfile
          push: false
          tags: hotel-booking/guest-service:latest

      - name: Build hotel-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hotel-service/Dockerfile
          push: false
          tags: hotel-booking/hotel-service:latest

      - name: Build room-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: room-service/Dockerfile
          push: false
          tags: hotel-booking/room-service:latest

      - name: Build reservation-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: reservation-service/Dockerfile
          push: false
          tags: hotel-booking/reservation-service:latest

      - name: Build payment-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: payment-service/Dockerfile
          push: false
          tags: hotel-booking/payment-service:latest

      - name: Build notification-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: notification-service/Dockerfile
          push: false
          tags: hotel-booking/notification-service:latest

      # Production deployment would push images to a registry and trigger deployment
